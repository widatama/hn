name: Deploy to GitHub Pages

on:
  push:
    tags:
      - 'deploy*'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_APP_TITLE: ${{ vars.NEXT_PUBLIC_APP_TITLE || 'Hacker News Reader' }}
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH || '/hn' }}
          NEXT_PUBLIC_BASE_API_URL: ${{ vars.NEXT_PUBLIC_BASE_API_URL || 'https://hacker-news.firebaseio.com/v0/' }}
          NEXT_PUBLIC_UPSTREAM_URL: ${{ vars.NEXT_PUBLIC_UPSTREAM_URL || 'https://news.ycombinator.com/' }}

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out